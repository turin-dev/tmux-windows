name: release

# Build a portable Windows binary and publish it as a GitHub Release whenever a
# version tag (v*) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        id: package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if (-not $ver) { $ver = "dev" }
          $stage = "dist/tmuxw"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/tmuxw.exe, README.md, LICENSE, THIRD-PARTY-NOTICES.md, tmuxw.conf.example $stage
          $zip = "dist/tmuxw-$ver-win-x64.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Copy-Item build/tmuxw.exe "dist/tmuxw-$ver-win-x64.exe"
          (Get-FileHash $zip -Algorithm SHA256).Hash | Out-File "dist/$ver.zip.sha256"
          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tmuxw-*-win-x64.zip
            dist/tmuxw-*-win-x64.exe
          generate_release_notes: true
