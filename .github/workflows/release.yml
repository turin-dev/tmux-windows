name: release

# Build a portable Windows binary and publish it as a GitHub Release whenever a
# version tag (v*) is pushed.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        id: package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if (-not $ver) { $ver = "dev" }
          $stage = "dist/tmuxw"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/tmuxw.exe, build/tmux.exe, README.md, LICENSE, THIRD-PARTY-NOTICES.md, tmuxw.conf.example $stage
          $zip = "dist/tmuxw-$ver-win-x64.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Copy-Item build/tmuxw.exe "dist/tmuxw-$ver-win-x64.exe"
          (Get-FileHash $zip -Algorithm SHA256).Hash | Out-File "dist/$ver.zip.sha256"
          "ver=$ver" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Build install wizard
        shell: pwsh
        run: |
          $ver = "${{ steps.package.outputs.ver }}"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "ISCC.exe" }  # fall back to PATH
          & $iscc "/DAppVersion=$ver" installer/tmuxw.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          $setup = "dist/tmuxw-$ver-setup.exe"
          (Get-FileHash $setup -Algorithm SHA256).Hash | Out-File "dist/$ver.setup.sha256"
          Get-FileHash $setup -Algorithm SHA256 | Format-List

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tmuxw-*-win-x64.zip
            dist/tmuxw-*-win-x64.exe
            dist/tmuxw-*-setup.exe
          generate_release_notes: true
